name: bujingyun_music
description: Flutter migration of the existing BuJingYunMusic Android local audio player.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  flutter_riverpod: ^2.6.1
  just_audio: ^0.10.5
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

dependency_overrides:
  path_provider_android: 2.2.23

flutter:
  uses-material-design: true
